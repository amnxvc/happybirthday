<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
    font-family:monospace;
}

#scene{
    width:100%;
    height:100%;
    position:relative;
}

/* MOVING HEART */
#heartContainer{
    position:absolute;
    top:35%;
    left:-200px;
    cursor:pointer;
    animation: moveHeart 35s linear infinite;
}

@keyframes moveHeart{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(calc(100vw + 400px));
    }
}

/* PIXEL HEART */
.pixel-heart{
    position:relative;
    width:220px;
    height:200px;
}

.pixel{
    position:absolute;
    width:20px;
    height:20px;
    background:#ffb6d9;
    animation: pastelHeart 5s infinite alternate;
}

@keyframes pastelHeart{
    0%{ background:#ffb6d9; }
    25%{ background:#ffd6e8; }
    50%{ background:#c8f7ff; }
    75%{ background:#e6d6ff; }
    100%{ background:#fff0b3; }
}

/* PIXEL TEXT */
.clickText{
    margin-top:25px;
    text-align:center;
    color:#ffc0cb;
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;

    text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000,
     0px  4px 0 #000;
}

/* CAKE */
#cakeSection{
    display:none;
    position:absolute;
    inset:0;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

#cake{
    image-rendering:pixelated;
    width:256px;
    height:256px;
}

#birthdayText{
    margin-top:20px;
    font-size:48px;
    font-weight:bold;
    text-align:center;

    animation: birthdayColors 2s infinite alternate;

    text-shadow:
    0 0 10px #fff,
    0 0 20px #fff;
}

@keyframes birthdayColors{
    from{
        color:#bde8ff;
    }
    to{
        color:#ffc8e8;
    }
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    pointer-events:none;
    animation: fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<div id="scene">

    <div id="heartContainer">

        <div class="pixel-heart" id="heart"></div>

        <div class="clickText">
            Click the heart !
        </div>

    </div>

    <div id="cakeSection">

        <!-- Replace with your gif filename -->
        <img
            id="cake"
            src="birthday cake.gif"
            alt="Birthday Cake">

        <div id="birthdayText">
            Happy Birthday Bilal !!
        </div>

    </div>

</div>

<script>
/* ==========================
   CREATE PIXEL HEART
========================== */

const heartPattern = [
"001100001100",
"011110011110",
"111111111111",
"111111111111",
"111111111111",
"011111111110",
"001111111100",
"000111111000",
"000011110000",
"000001100000"
];

const heart = document.getElementById("heart");

heartPattern.forEach((row,y)=>{
    [...row].forEach((cell,x)=>{
        if(cell==="1"){
            const pixel=document.createElement("div");
            pixel.className="pixel";
            pixel.style.left=(x*20)+"px";
            pixel.style.top=(y*20)+"px";
            pixel.style.animationDelay=
                (Math.random()*2)+"s";
            heart.appendChild(pixel);
        }
    });
});

/* ==========================
   HEART CLICK EVENT
========================== */

const heartContainer =
document.getElementById("heartContainer");

const cakeSection =
document.getElementById("cakeSection");

heartContainer.addEventListener("click",()=>{

    heartContainer.style.display="none";
    cakeSection.style.display="flex";

    startConfetti();

});

/* ==========================
   CONFETTI
========================== */

function createConfetti(){

    const colors=[
        "#ffc8e8",
        "#bde8ff",
        "#fff0b3",
        "#d8c8ff",
        "#c8ffd8"
    ];

    const piece=document.createElement("div");

    piece.className="confetti";

    piece.style.left=
        Math.random()*window.innerWidth+"px";

    piece.style.top="-20px";

    piece.style.background=
        colors[Math.floor(
            Math.random()*colors.length
        )];

    piece.style.width=
        (6+Math.random()*10)+"px";

    piece.style.height=
        (6+Math.random()*10)+"px";

    piece.style.animationDuration=
        (3+Math.random()*3)+"s";

    document.body.appendChild(piece);

    setTimeout(()=>{
        piece.remove();
    },6000);
}

function startConfetti(){

    const interval=setInterval(()=>{

        for(let i=0;i<20;i++){
            createConfetti();
        }

    },100);

    setTimeout(()=>{
        clearInterval(interval);
    },5000);
}
</script>

</body>
</html>
